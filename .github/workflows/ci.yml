name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. Lint + type check
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/ scripts/

      - name: Ruff format check
        run: ruff format --check src/ tests/ scripts/

  # ────────────────────────────────────────────────────────────────────
  # 2. Unit tests (no external services)
  # ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        env:
          OPENAI_API_KEY: dummy-for-tests
          GCP_PROJECT_ID: dummy-for-tests
        run: pytest tests/unit/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # 3. Docker image build (smoke test only — no push)
  # ────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: bi-copilot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the image
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=dummy \
            -e GCP_PROJECT_ID=dummy \
            bi-copilot:ci \
            python -c "from src.api.main import app; print('app loaded ok')"

  # ────────────────────────────────────────────────────────────────────
  # 4. Frontend build (lints + production bundle)
  # ────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm install

      - name: Build
        run: npm run build